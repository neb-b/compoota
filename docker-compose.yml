services:
  house-server:
    build:
      context: ./apps/server
    restart: unless-stopped
    ports:
      - "8787:8787"
    env_file:
      - .env
    volumes:
      - house-data:/data
      - ${HERMES_HOST_DIR:-/home/pi/.hermes}:${HERMES_CONTAINER_DIR:-/home/pi/.hermes}
      - ${UV_PYTHON_HOST_DIR:-/home/pi/.local/share/uv}:${UV_PYTHON_CONTAINER_DIR:-/home/pi/.local/share/uv}

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles:
      - tunnel
    depends_on:
      - house-server
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}

volumes:
  house-data:
