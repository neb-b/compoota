services:
  house-server:
    build:
      context: ./apps/server
    restart: unless-stopped
    ports:
      - "8787:8787"
    env_file:
      - .env
    volumes:
      - house-data:/data
      - ${HERMES_HOST_DIR:-/home/neb/.hermes}:/home/neb/.hermes
      - ${UV_PYTHON_HOST_DIR:-/home/neb/.local/share/uv}:/home/neb/.local/share/uv

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles:
      - tunnel
    depends_on:
      - house-server
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}

volumes:
  house-data:
